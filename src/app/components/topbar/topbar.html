<header class="navbar bg-base-200">
  <div class="flex-1">
    <h1 class="text-2xl font-bold">🎮 Jeu du Pendu</h1>
  </div>

  <div class="flex-none gap-2">
    <div class="stats shadow">

      <div class="stat stat-compact">
        <div class="stat-title">Erreurs</div>
        <div class="stat-value text-2xl">{{ game.errors() }}/5</div>
      </div>

      <div class="stat stat-compact">
        <div class="stat-title">Série</div>
        <div class="stat-value text-2xl">{{ game.currentStreak() }}</div>
      </div>

      <div class="stat stat-compact">
        <div class="stat-title">Record</div>
        <div class="stat-value text-2xl">{{ game.bestRecord() }}</div>
      </div>

    </div>
  </div>
</header>
